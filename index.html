<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio - Developer & Designer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      overflow: hidden;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    
    /* Loading Screen */
    .loader {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease;
      flex-direction: column;
      gap: 20px;
    }
    
    .loader.hidden {
      opacity: 0;
      pointer-events: none;
    }
    
    .loader-content {
      text-align: center;
      color: white;
    }
    
    .loader-icon {
      animation: pulse 1.5s ease-in-out infinite;
    }
    
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.1); opacity: 0.8; }
    }
    
    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .loader-text {
      font-size: 1rem;
      font-weight: 500;
      opacity: 0.9;
    }
    
    .loader-subtext {
      font-size: 0.85rem;
      opacity: 0.7;
      margin-top: 4px;
    }
    
    /* Image Placeholder Icons */
    .image-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #667eea33, #764ba233);
      color: white;
    }
    
    .image-placeholder .lucide {
      width: 48px;
      height: 48px;
      opacity: 0.8;
    }
    
    .image-placeholder.article { background: linear-gradient(135deg, #3b82f633, #8b5cf633); }
    .image-placeholder.project { background: linear-gradient(135deg, #10b98133, #3b82f633); }
    .image-placeholder.karya { background: linear-gradient(135deg, #f59e0b33, #ef444433); }
    
    /* Iframe */
    iframe {
      width: 100%;
      height: 100vh;
      border: none;
      display: block;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    
    iframe.loaded {
      opacity: 1;
    }
    
    /* Error State */
    .error-state {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: var(--bg-light, #f8f9fc);
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 20px;
      padding: 20px;
      text-align: center;
    }
    
    .error-state.show {
      display: flex;
    }
    
    .error-state .icon {
      width: 64px;
      height: 64px;
      color: #ef4444;
      margin-bottom: 16px;
    }
    
    .error-state h3 {
      font-size: 1.2rem;
      font-weight: 600;
      color: #1a1a2e;
      margin-bottom: 8px;
    }
    
    .error-state p {
      font-size: 0.9rem;
      color: #64748b;
      max-width: 400px;
    }
    
    .error-state .btn {
      margin-top: 16px;
      padding: 10px 24px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: transform 0.2s;
    }
    
    .error-state .btn:hover {
      transform: translateY(-2px);
    }
    
    /* Dark mode support */
    @media (prefers-color-scheme: dark) {
      .error-state {
        background: #1e1e2e;
      }
      .error-state h3 {
        color: #e2e8f0;
      }
      .error-state p {
        color: #a0aec0;
      }
    }
  </style>
</head>
<body>
  <!-- Loading Screen with Icons -->
  <div class="loader" id="loader">
    <div class="loader-content">
      <div class="loader-icon">
        <i data-lucide="loader-2" class="lucide spinner"></i>
      </div>
      <p class="loader-text">Loading Portfolio...</p>
      <p class="loader-subtext">Thanks For Waiting</p>
    </div>
  </div>

  <!-- Error State with Icon -->
  <div class="error-state" id="error-state">
    <i data-lucide="alert-circle" class="lucide icon"></i>
    <h3>Oops! Terjadi kesalahan</h3>
    <p>Portfolio tidak dapat dimuat. Silakan periksa koneksi internet atau coba refresh halaman.</p>
    <button class="btn" onclick="location.reload()">
      <i data-lucide="refresh-ccw" class="lucide" style="width:16px;height:16px"></i>
      Coba Lagi
    </button>
  </div>

  <!-- Embed Google Apps Script -->
  <iframe 
    src="https://script.google.com/macros/s/AKfycbx1E2HUIQ47EBE_9KI0gF7TL4kjY-uI-uwLncJAFUlyZP3Fwa4ix7UoVCEOueP8268-/exec" 
    id="portfolio-frame"
    onload="onFrameLoad()"
    onerror="onFrameError()"
  ></iframe>

  <script>
    // Initialize Lucide icons
    function initIcons() {
      if (typeof lucide !== 'undefined') {
        lucide.createIcons();
      }
    }

    // Handle iframe load
    function onFrameLoad() {
      const loader = document.getElementById('loader');
      const iframe = document.getElementById('portfolio-frame');
      
      // Hide loader with delay for smooth transition
      setTimeout(() => {
        loader.classList.add('hidden');
        iframe.classList.add('loaded');
        initIcons();
      }, 800);
      
      // Fallback: hide loader after 10 seconds max
      setTimeout(() => {
        if (!loader.classList.contains('hidden')) {
          loader.classList.add('hidden');
          iframe.classList.add('loaded');
        }
      }, 10000);
    }

    // Handle iframe error
    function onFrameError() {
      const loader = document.getElementById('loader');
      const errorState = document.getElementById('error-state');
      
      loader.classList.add('hidden');
      errorState.classList.add('show');
      initIcons();
    }

    // Fallback timeout
    setTimeout(() => {
      const loader = document.getElementById('loader');
      const iframe = document.getElementById('portfolio-frame');
      
      if (!loader.classList.contains('hidden') && iframe.readyState !== 'complete') {
        // Check if iframe is actually loaded
        try {
          if (iframe.contentDocument) {
            onFrameLoad();
          }
        } catch (e) {
          onFrameError();
        }
      }
    }, 15000);

    // Initialize on page load
    window.addEventListener('load', () => {
      initIcons();
    });

    // Handle visibility change (tab switch)
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') {
        initIcons();
      }
    });
  </script>
</body>
</html>
